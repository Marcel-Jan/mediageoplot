name: Build desktop apps

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: MediaMap-windows
            artifact_path: dist/MediaMap.exe
          - os: macos-latest
            artifact_name: MediaMap-macos-arm64
            artifact_path: dist/MediaMap.app
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Download exiftool (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $url = "https://sourceforge.net/projects/exiftool/files/exiftool-13.59_64.zip/download"
          Invoke-WebRequest -Uri $url -OutFile exiftool.zip
          Expand-Archive exiftool.zip -DestinationPath exiftool-extract
          New-Item -ItemType Directory -Force -Path resources/exiftool | Out-Null
          # The zip ships "exiftool(-k).exe"; rename to exiftool.exe.
          $exe = Get-ChildItem exiftool-extract -Recurse -Filter "exiftool*.exe" | Select-Object -First 1
          Copy-Item $exe.FullName resources/exiftool/exiftool.exe
          # Bring along the exiftool_files/ Perl runtime directory it depends on.
          $deps = Get-ChildItem exiftool-extract -Recurse -Filter "exiftool_files" -Directory | Select-Object -First 1
          if ($deps) { Copy-Item $deps.FullName resources/exiftool/exiftool_files -Recurse }

      - name: Download exiftool (macOS)
        if: runner.os == 'macOS'
        run: |
          curl -L -o exiftool.tar.gz "https://sourceforge.net/projects/exiftool/files/Image-ExifTool-13.59.tar.gz/download"
          mkdir -p resources/exiftool
          tar xzf exiftool.tar.gz
          # The tarball contains a single Image-ExifTool-<ver>/ dir; copy whole tree
          # so the `lib/` Perl modules sit alongside the exiftool script.
          cp -R Image-ExifTool-13.59/exiftool Image-ExifTool-13.59/lib resources/exiftool/
          chmod +x resources/exiftool/exiftool

      - name: Build app (flet pack)
        shell: bash
        run: |
          # On Windows --add-data uses ';' as separator; macOS/Linux use ':'.
          if [ "$RUNNER_OS" = "Windows" ]; then SEP=';'; else SEP=':'; fi
          flet pack run_gui.py --name MediaMap --yes \
            --add-data "resources/exiftool${SEP}resources/exiftool"

      - name: Codesign macOS .app with entitlements
        if: runner.os == 'macOS'
        run: |
          codesign --force --deep --sign - \
            --entitlements entitlements.plist \
            --options runtime \
            dist/MediaMap.app
          codesign -dv --entitlements - dist/MediaMap.app

      - name: Zip macOS .app bundle
        if: runner.os == 'macOS'
        run: |
          cd dist
          zip -ry MediaMap-macos-arm64.zip MediaMap.app

      - name: Upload Windows artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/MediaMap.exe
          if-no-files-found: error

      - name: Upload macOS artifact
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/MediaMap-macos-arm64.zip
          if-no-files-found: error

  release:
    name: Attach to GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/MediaMap-windows/MediaMap.exe
            artifacts/MediaMap-macos-arm64/MediaMap-macos-arm64.zip
          generate_release_notes: true
